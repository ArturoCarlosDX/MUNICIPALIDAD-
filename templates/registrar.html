{% extends "base.html" %}

{% block title %}Registrar trámite | Municipalidad ML{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8 col-xl-7">
    <div class="panel-card">
      <div class="panel-header">Registro de trámite</div>
      <form method="post" class="p-4 p-lg-5">
        <div class="mb-3">
          <label class="form-label">Nombre ciudadano</label>
          <input type="text" name="nombre_ciudadano" class="form-control form-control-lg" placeholder="Ingrese el nombre completo" required>
        </div>
        <div class="mb-3">
          <label class="form-label">DNI</label>
          <input type="text" name="dni" class="form-control form-control-lg" maxlength="8" placeholder="12345678" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Tipo de trámite</label>
          <input type="text" name="tipo_tramite" class="form-control form-control-lg" placeholder="Ej. Certificado de domicilio" required>
        </div>
        <div class="mb-4">
          <label class="form-label">Descripción</label>
          <textarea name="descripcion" class="form-control" rows="5" placeholder="Detalle del trámite" required></textarea>
        </div>
        <div class="d-flex justify-content-between flex-wrap gap-2">
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Volver</a>
          <button type="submit" class="btn btn-primary btn-lg">Registrar y clasificar</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
